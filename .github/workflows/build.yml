name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request: { }

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MISE
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Lint
        run: mise run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MISE
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Format
        run: mise run format

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MISE
        uses: jdx/mise-action@v4

      - name: Install CA
        run: mise run install:ca

      - name: Install dependencies
        run: mise run install

      - name: Build
        run: mise run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  deploy-green:
    name: "Deploy: green"
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-${{github.ref}}-deploy-green
    needs:
      - lint
      - format
      - build
    environment:
      name: green
      url: https://demo.engity.green
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy --project-name=demo-engity-green dist/green

  deploy-red:
    name: "Deploy: red"
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - build
    if: github.ref == 'refs/heads/main'
    environment:
      name: red
      url: https://demo.engity.app
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy --project-name=demo-engity-red dist/red

